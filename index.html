<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,.1);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        p {
            margin-bottom: 25px;
            line-height: 1.6;
        }

        a.button {
            display: inline-block;
            padding: 12px 24px;
            background: #0066ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        a.button:hover {
            background: #0052cc;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello, Dirkiboy!</h1>

    <p>
        This website is hosted on <strong>A2 Hosting</strong>.
        It is a static HTML page that can be updated directly from GitHub.
    </p>

    <a class="button" href="https://github.com/" target="_blank">
        Visit GitHub
    </a>
</div>

</body>
</html>
