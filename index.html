<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flight Map V2</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
    color: white;
}

svg {
    width: 100vw;
    height: 100vh;
}

.country {
    fill: #111;
    stroke: #333;
    stroke-width: 0.5;
}

.route {
    fill: none;
    stroke: #00ffd5;
    stroke-width: 1.2;
    opacity: 0.8;
}

.airport {
    fill: red;
    opacity: 0.8;
}

#year {
    position: absolute;
    bottom: 40px;
    left: 40px;
    font-size: 48px;
}

#stats {
    position: absolute;
    right: 40px;
    top: 40px;
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div id="year">2015</div>

<div id="stats">
Flights: 0<br>
Airports: 0<br>
Countries: 0<br>
Distance: 0 km
</div>

<svg></svg>

<script>

// ----------------------------
// SIZE & PROJECTION
// ----------------------------
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("svg");

const projection = d3.geoNaturalEarth1()
    .scale(260)
    .translate([width/2, height/2]);

const path = d3.geoPath().projection(projection);

// ----------------------------
// DATA (replace with CSV later)
// ----------------------------
const airports = {
    FRA: [8.5622, 50.0379],
    LHR: [-0.4543, 51.4700],
    JFK: [-73.7781, 40.6413],
    SIN: [103.9915, 1.3644],
    NRT: [140.3929, 35.7767],
    DXB: [55.3644, 25.2532]
};

const flights = [
    {from:"FRA", to:"LHR", year:2015},
    {from:"LHR", to:"JFK", year:2016},
    {from:"FRA", to:"JFK", year:2016},
    {from:"FRA", to:"SIN", year:2017},
    {from:"SIN", to:"NRT", year:2018},
    {from:"FRA", to:"DXB", year:2019}
];

// ----------------------------
// WORLD MAP
// ----------------------------
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(world => {

    const countries = topojson.feature(world, world.objects.countries);

    svg.append("g")
        .selectAll("path")
        .data(countries.features)
        .enter()
        .append("path")
        .attr("class", "country")
        .attr("d", path);

    startAnimation();
});

// ----------------------------
// DRAW AIRPORT MARKERS
// ----------------------------
function drawAirports() {
    svg.selectAll("circle")
        .data(Object.entries(airports))
        .enter()
        .append("circle")
        .attr("class", "airport")
        .attr("r", 2)
        .attr("cx", d => projection(d[1])[0])
        .attr("cy", d => projection(d[1])[1]);
}

// ----------------------------
// FLIGHT ARC FUNCTION
// ----------------------------
function flightArc(from, to) {

    const coords = [airports[from], airports[to]];

    return {
        type: "LineString",
        coordinates: coords
    };
}

// ----------------------------
// ANIMATE AIRPLANE
// ----------------------------
function animatePlane(path) {

    const plane = svg.append("circle")
        .attr("r", 3)
        .attr("fill", "white");

    const totalLength = path.getTotalLength();

    plane.transition()
        .duration(2000)
        .attrTween("transform", function() {
            return function(t) {
                const p = path.getPointAtLength(t * totalLength);
                return `translate(${p.x},${p.y})`;
            };
        })
        .on("end", () => plane.remove());
}

// ----------------------------
// DRAW FLIGHT
// ----------------------------
function drawFlight(f) {

    const geoLine = flightArc(f.from, f.to);

    const linePath = d3.geoPath().projection(projection)(geoLine);

    const pathElement = svg.append("path")
        .attr("class", "route")
        .attr("d", linePath)
        .attr("stroke-dasharray", function() {
            return this.getTotalLength();
        })
        .attr("stroke-dashoffset", function() {
            return this.getTotalLength();
        });

    pathElement.transition()
        .duration(1500)
        .attr("stroke-dashoffset", 0);

    animatePlane(pathElement.node());

    d3.select("#year").text(f.year);

    d3.select("#stats").html(`
        Flights: ${flights.indexOf(f)+1}<br>
        Airports: ${Object.keys(airports).length}<br>
        Countries: ~${new Set(flights.map(d => d.from)).size}<br>
        Distance: ${(flights.indexOf(f)+1)*6200} km
    `);
}

// ----------------------------
// ANIMATION LOOP
// ----------------------------
function startAnimation() {

    drawAirports();

    let i = 0;

    function loop() {
        if (i >= flights.length) return;

        drawFlight(flights[i]);
        i++;

        setTimeout(loop, 2200);
    }

    loop();
}

</script>

</body>
</html>
