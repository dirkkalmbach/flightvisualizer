<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight Visualizer</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
</head>
<body>

<div id="intro">
    <div class="spinner"></div>
    Loading flight log...
</div>

<div id="header"><h1>Flight Log</h1></div>
<div id="year-display">----</div>
<div id="flight-info"></div>
<div id="stats"></div>

<div id="controls">
    <button id="btn-play">&#9654; Play</button>
    <button id="btn-pause">&#9208; Pause</button>
    <button id="btn-reset">&#8634; Reset</button>
    <button id="btn-all">All</button>
    <select id="speed">
        <option value="2500">0.5x</option>
        <option value="1500" selected>1x</option>
        <option value="800">2x</option>
        <option value="400">4x</option>
    </select>
</div>

<div id="progress"></div>

<svg></svg>

<script src="app.js"></script>

</body>
</html>
